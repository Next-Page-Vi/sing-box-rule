name: Build Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: build-rules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync rule files
        run: uv run --no-dev --no-editable sing-box-rule build --config config.toml

      - name: Prepare artifact branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init publish
          git -C publish remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git -C publish fetch --depth 1 origin rule-set; then
            git -C publish checkout -B rule-set FETCH_HEAD
          else
            git -C publish checkout --orphan rule-set
          fi
          find publish -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R ruleset publish/ruleset
          cat > publish/README.md <<'EOF'
          # rule-set

          Auto-generated sing-box rule-set artifacts.
          EOF

      - name: Commit artifacts
        run: |
          git -C publish config user.name "github-actions[bot]"
          git -C publish config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C publish add .
          git -C publish diff --cached --quiet && exit 0
          git -C publish commit -m "chore: update generated rules"
          git -C publish push origin HEAD:rule-set
